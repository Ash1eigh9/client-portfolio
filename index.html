<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casebook — Client &amp; Policy Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#16223A;
    --ink-soft:#3B4A63;
    --ink-faint:#7C8AA3;
    --paper:#F4F5F8;
    --paper-raised:#FFFFFF;
    --line:#DCE1E8;
    --line-soft:#EAEDF1;
    --green:#2F6F5E;
    --green-soft:#E3F0EC;
    --amber:#B8742B;
    --amber-soft:#FAEBD9;
    --red:#AE4438;
    --red-soft:#F7E3E0;
    --serif:'Fraunces', serif;
    --sans:'Inter', sans-serif;
    --mono:'IBM Plex Mono', monospace;
    --r-sm:6px;
    --r-md:10px;
    --r-lg:16px;
  }
  *{box-sizing:border-box;}
  svg{width:16px;height:16px;flex-shrink:0;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  a{color:inherit;}
  :focus-visible{outline:2px solid var(--green);outline-offset:2px;}

  /* ---------- layout ---------- */
  .app-shell{display:flex;min-height:100vh;}
  .sidebar{
    width:228px;flex-shrink:0;background:var(--ink);color:#E9ECF3;
    display:flex;flex-direction:column;padding:24px 16px;
    position:sticky;top:0;height:100vh;
  }
  .brand{padding:0 8px 22px 8px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:18px;}
  .brand .mark{font-family:var(--serif);font-size:23px;font-weight:600;letter-spacing:0.2px;color:#fff;}
  .brand .tag{font-size:11px;color:#9FB0C7;margin-top:4px;letter-spacing:0.3px;text-transform:uppercase;}
  .nav{display:flex;flex-direction:column;gap:2px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-sm);
    color:#C7D0E0;background:transparent;border:none;text-align:left;font-size:14px;font-weight:500;
    border-left:3px solid transparent;width:100%;
  }
  .nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.85;}
  .nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,0.09);color:#fff;border-left-color:var(--amber);}
  .sidebar-foot{margin-top:auto;padding:10px 8px 0;font-size:11px;color:#7488A6;border-top:1px solid rgba(255,255,255,0.1);padding-top:14px;}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    padding:22px 32px 16px;display:flex;align-items:flex-end;justify-content:space-between;
    gap:16px;flex-wrap:wrap;
  }
  .topbar h1{font-family:var(--serif);font-weight:600;font-size:26px;margin:0;color:var(--ink);}
  .topbar .sub{color:var(--ink-faint);font-size:13px;margin-top:4px;}
  .topbar-actions{display:flex;gap:10px;flex-wrap:wrap;}
  .content{padding:4px 32px 40px;flex:1;}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;gap:7px;border-radius:var(--r-sm);
    padding:9px 15px;font-size:13.5px;font-weight:600;border:1px solid transparent;
    transition:background .15s,border-color .15s;white-space:nowrap;
  }
  .btn svg{width:14px;height:14px;}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{background:#222F4A;}
  .btn-accent{background:var(--green);color:#fff;}
  .btn-accent:hover{background:#275C4D;}
  .btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--line);}
  .btn-ghost:hover{background:#fff;border-color:var(--ink-faint);}
  .btn-danger{background:transparent;color:var(--red);border-color:var(--red-soft);}
  .btn-danger:hover{background:var(--red-soft);}
  .btn-sm{padding:6px 11px;font-size:12.5px;}
  .icon-btn{
    background:transparent;border:1px solid var(--line);border-radius:var(--r-sm);
    width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-soft);
  }
  .icon-btn svg{width:16px;height:16px;flex-shrink:0;}
  .icon-btn:hover{background:#fff;border-color:var(--ink-faint);}

  /* ---------- cards / panels ---------- */
  .panel{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--r-lg);}
  .panel-head{padding:18px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .panel-head h2{font-family:var(--serif);font-size:17px;font-weight:600;margin:0;}
  .panel-body{padding:18px 20px;}

  /* ---------- dashboard ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
  .stat-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 20px;}
  .stat-card .num{font-family:var(--serif);font-size:30px;font-weight:600;line-height:1;}
  .stat-card .lbl{font-size:12.5px;color:var(--ink-faint);margin-top:6px;font-weight:500;}
  .stat-card.warn .num{color:var(--amber);}
  .stat-card.danger .num{color:var(--red);}
  .stat-card.ok .num{color:var(--green);}

  .reminder-row{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:13px 0;border-bottom:1px solid var(--line-soft);
  }
  .reminder-row:last-child{border-bottom:none;}
  .reminder-main{display:flex;align-items:center;gap:12px;min-width:0;}
  .reminder-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .reminder-text .name{font-weight:600;font-size:14px;}
  .reminder-text .meta{font-size:12.5px;color:var(--ink-faint);margin-top:2px;}
  .reminder-meta{text-align:right;flex-shrink:0;}
  .reminder-meta .date{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);}

  /* ---------- badges ---------- */
  .badge{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    padding:3px 9px;border-radius:99px;letter-spacing:0.2px;
  }
  .badge.ok{background:var(--green-soft);color:var(--green);}
  .badge.warn{background:var(--amber-soft);color:var(--amber);}
  .badge.danger{background:var(--red-soft);color:var(--red);}
  .badge.neutral{background:#EEF0F4;color:var(--ink-soft);}

  /* ---------- search / filters ---------- */
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .search-box{
    display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    border-radius:var(--r-sm);padding:8px 12px;min-width:220px;flex:1;max-width:340px;
  }
  .search-box svg{width:15px;height:15px;color:var(--ink-faint);flex-shrink:0;}
  .search-box input{border:none;outline:none;font-size:13.5px;width:100%;background:transparent;}
  select.filter-select{
    border:1px solid var(--line);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;
    background:#fff;color:var(--ink-soft);
  }

  /* ---------- client list ---------- */
  .client-list{display:flex;flex-direction:column;}
  .client-row{
    display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:14px;align-items:center;
    padding:14px 6px;border-bottom:1px solid var(--line-soft);cursor:pointer;
  }
  .client-row:hover{background:#FAFBFC;}
  .client-row:last-child{border-bottom:none;}
  .client-name{font-family:var(--serif);font-weight:600;font-size:15px;}
  .client-sub{font-size:12px;color:var(--ink-faint);margin-top:2px;}
  .mono-id{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);}
  .col-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-faint);font-weight:600;}
  .list-head{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:14px;padding:0 6px 8px;border-bottom:1px solid var(--line);margin-bottom:4px;}

  /* ---------- empty state ---------- */
  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-faint);}
  .empty-state svg{width:38px;height:38px;color:var(--line);margin-bottom:14px;}
  .empty-state h3{font-family:var(--serif);color:var(--ink-soft);font-size:17px;margin:0 0 6px;}
  .empty-state p{font-size:13.5px;margin:0 0 16px;}

  /* ---------- dossier (client detail) ---------- */
  .dossier-head{
    background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--r-lg);
    padding:22px 24px;margin-bottom:20px;display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;
  }
  .dossier-id-block{display:flex;flex-direction:column;gap:8px;}
  .dossier-id-block .name{font-family:var(--serif);font-size:24px;font-weight:600;}
  .dossier-fields{display:flex;gap:22px;flex-wrap:wrap;margin-top:10px;}
  .dossier-field .col-label{display:block;margin-bottom:3px;}
  .dossier-field .val{font-size:13.5px;color:var(--ink-soft);}
  .dossier-actions{display:flex;gap:8px;align-self:flex-start;flex-wrap:wrap;}

  .section-title{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px;}
  .section-title h2{font-family:var(--serif);font-size:17px;font-weight:600;margin:0;}

  /* ---------- policy cards ---------- */
  .policy-card{
    background:var(--paper-raised);border:1px solid var(--line);border-left:5px solid var(--ink-faint);
    border-radius:var(--r-md);padding:16px 18px;margin-bottom:12px;
  }
  .policy-top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
  .policy-title{font-weight:700;font-size:14.5px;}
  .policy-insurer{font-size:12.5px;color:var(--ink-faint);margin-top:2px;}
  .policy-actions{display:flex;gap:6px;align-items:flex-start;}
  .policy-dates{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:10px;}
  .policy-dates .col-label{display:block;margin-bottom:3px;}
  .policy-dates .val{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);}
  .policy-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--line-soft);flex-wrap:wrap;gap:10px;}
  .premium-amt{font-family:var(--mono);font-size:13px;color:var(--ink);font-weight:600;}
  .premium-freq{font-size:11.5px;color:var(--ink-faint);}
  .swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

  /* ---------- forms ---------- */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid.single{grid-template-columns:1fr;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.span2{grid-column:1 / -1;}
  .form-group label{font-size:12px;font-weight:600;color:var(--ink-soft);}
  .form-group .hint{font-size:11px;color:var(--ink-faint);}
  .form-group input,.form-group select,.form-group textarea{
    border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:13.5px;color:var(--ink);background:#fff;
  }
  .form-group input[type="checkbox"]{border:none;padding:0;width:16px;height:16px;background:none;}
  .form-group textarea{resize:vertical;min-height:60px;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green);}
  .inline-add{display:flex;gap:8px;}
  .inline-add select{flex:1;}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line-soft);}

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,28,45,0.5);display:flex;align-items:center;justify-content:center;
    padding:20px;z-index:100;animation:fadeIn .12s ease-out;
  }
  .modal{
    background:#fff;border-radius:var(--r-lg);padding:24px 26px;width:100%;max-width:560px;
    max-height:88vh;overflow-y:auto;box-shadow:0 20px 50px rgba(20,28,45,0.25);
  }
  .modal h2{font-family:var(--serif);font-size:19px;margin:0 0 4px;}
  .modal .modal-sub{font-size:12.5px;color:var(--ink-faint);margin-bottom:18px;}
  .modal.small{max-width:420px;}
  .modal.wide{max-width:760px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- toast ---------- */
  .toast-container{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:200;}
  .toast{
    background:var(--ink);color:#fff;padding:11px 16px;border-radius:var(--r-sm);font-size:13px;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);animation:fadeIn .15s ease-out;display:flex;align-items:center;gap:8px;
  }
  .toast.danger{background:var(--red);}

  /* ---------- print ---------- */
  #printArea{display:none;}
  @media print{
    .app-shell{display:none !important;}
    .modal-overlay,.toast-container{display:none !important;}
    #printArea{display:block !important;}
    body{background:#fff;}
  }
  .print-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:20px;}
  .print-header .pmark{font-family:var(--serif);font-size:20px;font-weight:700;}
  .print-header .pmeta{text-align:right;font-size:11.5px;color:var(--ink-soft);}
  .print-section{margin-bottom:18px;}
  .print-section h3{font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-faint);border-bottom:1px solid var(--line);padding-bottom:5px;margin-bottom:8px;}
  .print-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 18px;font-size:12.5px;}
  table.print-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:16px;}
  table.print-table th,table.print-table td{border:1px solid #ccc;padding:6px 8px;text-align:left;}
  table.print-table th{background:#F0F1F4;font-size:10.5px;text-transform:uppercase;letter-spacing:0.3px;}

  /* ---------- lapsing risk + policy mix ---------- */
  .panel-alert{border-color:var(--red-soft);box-shadow:0 0 0 1px var(--red-soft) inset;}
  .panel-alert .panel-head{background:var(--red-soft);border-radius:var(--r-lg) var(--r-lg) 0 0;}
  .panel-alert .panel-head h2{color:var(--red);}
  .mix-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--line-soft);}
  .mix-row:last-child{border-bottom:none;}
  .mix-label{width:150px;flex-shrink:0;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .mix-bar-track{flex:1;background:#EEF0F4;border-radius:4px;height:10px;overflow:hidden;}
  .mix-bar-fill{height:100%;border-radius:4px;}
  .mix-count{width:140px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--ink-soft);flex-shrink:0;}

  /* ---------- responsive ---------- */
  /* ---------- investments ---------- */
  .inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .fund-table{width:100%;border-collapse:collapse;font-size:13px;}
  .fund-table th{text-align:left;padding:9px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-faint);font-weight:600;border-bottom:2px solid var(--line);white-space:nowrap;}
  .fund-table td{padding:11px 12px;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
  .fund-table tbody tr:last-child td{border-bottom:none;}
  .fund-table tbody tr:hover td{background:#FAFBFC;}
  .fund-table tfoot td{border-top:2px solid var(--line);font-weight:700;background:var(--paper);padding:11px 12px;}
  .perf-gain{color:var(--green);font-weight:600;}
  .perf-loss{color:var(--red);font-weight:600;}
  .perf-flat{color:var(--ink-faint);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinning{animation:spin 1s linear infinite;}

  /* --- active tab looping animation --- */
  @keyframes navActivePulse {
    0%, 65%, 100% { background: rgba(255,255,255,0.09); }
    82% { background: rgba(255,255,255,0.20); }
  }
  @keyframes navActiveBorder {
    0%, 65%, 100% { border-left-color: #B8742B; box-shadow: none; }
    82% { border-left-color: #E8A24A; box-shadow: 2px 0 12px rgba(184,116,43,0.5); }
  }
  @keyframes navActiveIcon {
    0%, 55%, 100% { transform: translateY(0) scale(1); }
    28% { transform: translateY(-3px) scale(1.15); }
    42% { transform: translateY(0) scale(1.05); }
  }
  .nav-item.active {
    animation: navActivePulse 2.8s ease-in-out infinite, navActiveBorder 2.8s ease-in-out infinite;
  }
  .nav-item.active svg {
    animation: navActiveIcon 2.8s ease-in-out infinite;
  }

  @media (max-width:860px){
    .app-shell{flex-direction:column;}
    .sidebar{
      position:sticky;top:0;height:auto;width:100%;flex-direction:row;align-items:center;
      padding:12px 16px;overflow-x:auto;z-index:50;
    }
    .brand{border-bottom:none;margin-bottom:0;padding:0 14px 0 0;border-right:1px solid rgba(255,255,255,0.12);}
    .nav{flex-direction:row;}
    .sidebar-foot{display:none;}
    .topbar,.content{padding-left:18px;padding-right:18px;}
    .client-row,.list-head{grid-template-columns:1fr;gap:4px;}
    .list-head{display:none;}
    .form-grid{grid-template-columns:1fr;}
    .dossier-fields{gap:14px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed;inset:0;background:#16223A;display:flex;align-items:center;justify-content:center;z-index:999;">
  <div style="text-align:center;color:#fff;padding:40px;">
    <div style="font-family:'Fraunces',serif;font-size:38px;font-weight:600;margin-bottom:6px;">Casebook</div>
    <div style="font-size:12px;color:#9FB0C7;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:36px;">Client &amp; Policy Register</div>
    <button id="signInBtn" style="background:#fff;color:#16223A;border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,0.3);">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <p id="loginError" style="font-size:12.5px;color:#E87C73;margin-top:16px;min-height:18px;"></p>
    <p style="font-size:11.5px;color:#7488A6;margin-top:8px;">Your data is private — only you can access it.</p>
  </div>
</div>

<div class="app-shell" id="appShell" style="display:none;">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">Casebook</div>
      <div class="tag">Client &amp; Policy Register</div>
    </div>
    <nav class="nav" id="mainNav">
      <button class="nav-item" data-action="nav" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        Dashboard

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(str){ return (str ?? '').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return '—';
  return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function daysUntil(iso){
  if(!iso) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d)) return null;
  return Math.round((d - today) / 86400000);
}
function calcAge(dobIso){
  if(!dobIso) return null;
  const dob = new Date(dobIso + 'T00:00:00');
  if(isNaN(dob)) return null;
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const hasHadBirthdayThisYear = (today.getMonth() > dob.getMonth()) || (today.getMonth() === dob.getMonth() && today.getDate() >= dob.getDate());
  if(!hasHadBirthdayThisYear) age--;
  return age;
}
const MONTH_NAMES = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
function monthFromName(s){ const idx = MONTH_NAMES.findIndex(m => s.toLowerCase().slice(0,3) === m); return idx === -1 ? null : idx + 1; }
function buildIsoDate(y, mo, d){
  y = parseInt(y,10); mo = parseInt(mo,10); d = parseInt(d,10);
  if(!y || !mo || !d || mo<1 || mo>12 || d<1 || d>31) return null;
  if(y < 100) y += y < 30 ? 2000 : 1900;
  const dt = new Date(y, mo-1, d);
  if(dt.getFullYear()!==y || dt.getMonth()!==mo-1 || dt.getDate()!==d) return null;
  return String(y).padStart(4,'0') + '-' + String(mo).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}
function parseFlexibleDate(input){
  if(!input) return null;
  let str = input.trim().replace(/(\d)(st|nd|rd|th)\b/gi, '$1');
  if(!str) return null;
  let m = str.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if(m) return buildIsoDate(m[1], m[2], m[3]);
  m = str.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if(m) return buildIsoDate(m[3], m[2], m[1]);
  m = str.match(/^(\d{2})(\d{2})(\d{4})$/);
  if(m) return buildIsoDate(m[3], m[2], m[1]);
  m = str.match(/^(\d{1,2})\s+([A-Za-z]+)\.?\s+(\d{4})$/);
  if(m){ const mo = monthFromName(m[2]); if(mo) return buildIsoDate(m[3], mo, m[1]); }
  m = str.match(/^([A-Za-z]+)\.?\s+(\d{1,2}),?\s+(\d{4})$/);
  if(m){ const mo = monthFromName(m[1]); if(mo) return buildIsoDate(m[3], mo, m[2]); }
  return null;
}
function parseDateField(raw){
  raw = (raw||'').trim();
  if(!raw) return { iso:'', unrecognised:false };
  const iso = parseFlexibleDate(raw);
  return iso ? { iso, unrecognised:false } : { iso:'', unrecognised:true };
}
function wireFlexDateInput(inputId, hintId){
  const input = document.getElementById(inputId);
  const hint = document.getElementById(hintId);
  if(!input || !hint) return;
  input.addEventListener('input', () => {
    const raw = input.value.trim();
    if(!raw){ hint.textContent = ''; hint.style.color = ''; return; }
    const iso = parseFlexibleDate(raw);
    if(iso){ hint.textContent = 'Recognised as ' + fmtDate(iso); hint.style.color = 'var(--green)'; }
    else { hint.textContent = 'Not recognised yet — try DD/MM/YYYY or 06 May 2026'; hint.style.color = 'var(--amber)'; }
  });
}

const LAPSE_RISK_DAYS = 14;
const TOUCH_BASE_DAYS = 90;
const ANNUAL_FACTOR = { 'Monthly':12, 'Quarterly':4, 'Semi-Annually':2, 'Annually':1 };

function annualizedPremium(p){
  if(!p.premiumAmount || p.premiumFrequency === 'Single Premium') return 0;
  return (Number(p.premiumAmount)||0) * (ANNUAL_FACTOR[p.premiumFrequency] || 0);
}
function nextBirthday(dobIso){
  if(!dobIso) return null;
  const dob = new Date(dobIso + 'T00:00:00');
  if(isNaN(dob)) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  let next = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
  if(next < today) next = new Date(today.getFullYear()+1, dob.getMonth(), dob.getDate());
  const days = Math.round((next - today) / 86400000);
  return { days, turningAge: next.getFullYear() - dob.getFullYear() };
}
function daysSinceContact(c){
  const ref = c.lastContactedDate || (c.createdAt ? c.createdAt.slice(0,10) : null);
  if(!ref) return Infinity;
  const d = new Date(ref + 'T00:00:00');
  if(isNaN(d)) return Infinity;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((today - d) / 86400000);
}

  const lapsingRisk = dueData.filter(x => x.d <= -LAPSE_RISK_DAYS).sort((a,b) => a.d - b.d);
  const duesSoon = dueData.filter(x => x.d > -LAPSE_RISK_DAYS && x.d <= 30).sort((a,b) => a.d - b.d);

  const maturingSoon = inForcePolicies.filter(p => p.maturityDate).map(p => ({ p, d: daysUntil(p.maturityDate) })).filter(x => x.d !== null && x.d <= 90).sort((a,b) => a.d - b.d);

  expiringSoon.filter(x => x.d >= 0 && x.d <= 7).forEach(x => thisWeek.push({ ...x, kind:'expiry' }));
  maturingSoon.filter(x => x.d >= 0 && x.d <= 7).forEach(x => thisWeek.push({ ...x, kind:'maturity' }));
  const birthdaysAll = clients.map(c => ({ c, nb: nextBirthday(c.dob) })).filter(x => x.nb);
  birthdaysAll.filter(x => x.nb.days <= 7).forEach(x => thisWeek.push({ d:x.nb.days, kind:'birthday', client:x.c, turningAge:x.nb.turningAge }));
  const withdrawalReminders = inForcePolicies
    .filter(p => isPulsarPolicy(p) && p.partialWithdrawalDate && p.partialWithdrawalAmount)
    .map(p => ({ p, client: p.client, d: daysUntil(p.partialWithdrawalDate) }))
    .filter(x => x.d !== null && x.d > -14)
    .sort((a,b) => a.d - b.d);
  withdrawalReminders.filter(x => (x.d - 30) >= -3 && (x.d - 30) <= 7)
    .forEach(x => thisWeek.push({ d: Math.max(0, x.d - 30), kind:'withdrawal-submit', p: x.p, dw: x.d }));
  thisWeek.sort((a,b) => a.d - b.d);
  const birthdaysSoon = birthdaysAll.filter(x => x.nb.days <= 30).sort((a,b) => a.nb.days - b.nb.days);
  const needsTouch = clients.map(c => ({ c, days: daysSinceContact(c) })).filter(x => x.days >= TOUCH_BASE_DAYS).sort((a,b) => b.days - a.days);
  const totalAnnualized = inForcePolicies.reduce((sum,p) => sum + annualizedPremium(p), 0);
  const totalSingle = inForcePolicies.filter(p => p.premiumFrequency === 'Single Premium').reduce((sum,p) => sum + (Number(p.premiumAmount)||0), 0);
  const mixMap = {};
  inForcePolicies.forEach(p => { const key = p.category || 'Uncategorised'; if(!mixMap[key]) mixMap[key] = { count:0, premium:0 }; mixMap[key].count++; mixMap[key].premium += annualizedPremium(p); });
  const mix = Object.entries(mixMap).sort((a,b) => b[1].count - a[1].count);
  const maxMixCount = mix.length ? mix[0][1].count : 0;

  main.innerHTML = `
    <div class="topbar">

        <button class="btn btn-ghost" data-action="export-portfolio-pdf">${icon('printer')} Portfolio summary (PDF)</button>

      </div>
    </div>
    <div class="content">
      <div class="stat-grid">
        <div class="stat-card"><div class="num">${clients.length}</div><div class="lbl">Clients on file</div></div>
        <div class="stat-card"><div class="num">${inForcePolicies.length} <span style="font-size:15px;color:var(--ink-faint);">/ ${allPolicies.length}</span></div><div class="lbl">Policies in force / on file</div></div>
        <div class="stat-card ${lapsingRisk.length ? 'danger' : 'ok'}"><div class="num">${lapsingRisk.length}</div><div class="lbl">Lapsing risk (${LAPSE_RISK_DAYS}+ days overdue)</div></div>
        <div class="stat-card ${duesSoon.length ? 'warn' : 'ok'}"><div class="num">${duesSoon.length}</div><div class="lbl">Premiums due ≤30 days</div></div>
        <div class="stat-card ok"><div class="num">${money(totalAnnualized)}</div><div class="lbl">Annualised premium in force</div></div>
        <div class="stat-card"><div class="num">${money(totalSingle)}</div><div class="lbl">Single-premium total</div></div>
      </div>
      <div class="panel" style="margin-bottom:18px;"><div class="panel-head"><h2>This week at a glance</h2><span class="col-label">Next 7 days</span></div><div class="panel-body">${thisWeek.length === 0 ? emptyInline('Nothing landing in the next 7 days — a quiet week.') : thisWeek.map(x => x.kind === 'birthday' ? birthdayRow(x.client, x.d, x.turningAge) : x.kind === 'withdrawal-submit' ? withdrawalRow(x.p, x.p.client, x.dw) : reminderRow(x.p, x.p.client, x.d, x.kind)).join('')}</div></div>

      <div class="panel" style="margin-bottom:18px;"><div class="panel-head"><h2>Premiums due soon</h2><span class="col-label">Next 30 days</span></div><div class="panel-body">${duesSoon.length === 0 ? emptyInline('Nothing due in the next 30 days.') : duesSoon.slice(0,8).map(x => reminderRow(x.p, x.p.client, x.d, 'premium')).join('')}</div></div>
      <div class="panel" style="margin-bottom:18px;"><div class="panel-head"><h2>Hospital plan premium reviews</h2><span class="col-label">Renewing within 6 months</span></div><div class="panel-body">${premiumReviewDue.length === 0 ? emptyInline('No hospital plan renewals within 6 months.') : premiumReviewDue.map(x => premiumReviewRow(x.p, x.p.client, x.d)).join('')}</div></div>
      <div class="panel" style="margin-bottom:18px;"><div class="panel-head"><h2>Policies expiring</h2><span class="col-label">Next 60 days</span></div><div class="panel-body">${expiringSoon.length === 0 ? emptyInline('No expiries coming up in the next 60 days.') : expiringSoon.slice(0,8).map(x => reminderRow(x.p, x.p.client, x.d, 'expiry')).join('')}</div></div>
      <div class="panel" style="margin-bottom:18px;"><div class="panel-head"><h2>Maturing soon</h2><span class="col-label">Next 90 days</span></div><div class="panel-body">${maturingSoon.length === 0 ? emptyInline('No maturities coming up in the next 90 days.') : maturingSoon.slice(0,8).map(x => reminderRow(x.p, x.p.client, x.d, 'maturity')).join('')}</div></div>
      <div class="panel ${withdrawalReminders.length ? 'panel-alert' : ''}" style="margin-bottom:18px;"><div class="panel-head" style="${withdrawalReminders.length ? '' : ''}"><h2 style="${withdrawalReminders.length ? 'color:var(--amber)' : ''}">Pulsar partial withdrawals</h2><span class="col-label">Submit form 30 days before · 5–7 working days processing</span></div><div class="panel-body">${withdrawalReminders.length === 0 ? emptyInline('No partial withdrawals planned — add one when editing a Pulsar policy.') : withdrawalReminders.map(x => withdrawalRow(x.p, x.client, x.d)).join('')}</div></div>
      <div class="panel" style="margin-bottom:18px;"><div class="panel-head"><h2>Birthdays</h2><span class="col-label">Next 30 days</span></div><div class="panel-body">${birthdaysSoon.length === 0 ? emptyInline('No client birthdays in the next 30 days.') : birthdaysSoon.map(x => birthdayRow(x.c, x.nb.days, x.nb.turningAge)).join('')}</div></div>
      <div class="panel" style="margin-bottom:18px;"><div class="panel-head"><h2>Needs a touch base</h2><span class="col-label">No contact in ${TOUCH_BASE_DAYS}+ days</span></div><div class="panel-body">${needsTouch.length === 0 ? emptyInline('Everyone has been contacted recently — nice work.') : needsTouch.slice(0,10).map(x => touchRow(x.c, x.days)).join('')}</div></div>
      <div class="panel"><div class="panel-head"><h2>Policy mix</h2><span class="col-label">${allPolicies.length} policies by category</span></div><div class="panel-body">${mix.length === 0 ? emptyInline("Add policies to see your book's category mix.") : mix.map(([cat, v]) => mixRow(cat, v, maxMixCount)).join('')}</div></div>
    </div>
  `;
}
function money(n){ return 'S$ ' + (Number(n)||0).toLocaleString(undefined, { minimumFractionDigits:0, maximumFractionDigits:0 }); }
function reminderRow(p, client, d, kind, showPaidAction){
  const color = catColor(p.category);
  const dateField = kind === 'premium' ? p.premiumDueDate : kind === 'expiry' ? p.expiryDate : p.maturityDate;
  const dLabel = d < 0 ? Math.abs(d)+'d overdue' : d===0 ? 'Today' : 'in '+d+'d';
  const typeTag = kind === 'expiry' ? 'Expiry' : kind === 'maturity' ? 'Maturity' : 'Premium';
  return `<div class="reminder-row"><div class="reminder-main"><span class="reminder-dot" style="background:${color}"></span><div class="reminder-text"><div class="name">${esc(p.name)} <span style="color:var(--ink-faint);font-weight:400;">— ${esc(client.name)}</span></div><div class="meta">${typeTag} · ${esc(p.category || 'Uncategorised')} · ${esc(p.insurer || '')}</div></div></div><div class="reminder-meta"><div class="date">${fmtDate(dateField)}</div><div style="margin-top:3px;"><span class="badge ${d<0?'danger':d<=14?'warn':'neutral'}">${dLabel}</span></div>${showPaidAction ? `<button class="btn btn-ghost btn-sm" style="margin-top:6px;" data-action="mark-paid" data-client="${client.id}" data-policy="${p.id}">${icon('check')} Mark paid</button>` : ''}</div></div>`;
}
function premiumReviewRow(p, client, d){
  const color = catColor(p.category);
  const monthsAway = Math.round(d/30);
  return `<div class="reminder-row"><div class="reminder-main"><span class="reminder-dot" style="background:${color}"></span><div class="reminder-text"><div class="name">${esc(p.name)} <span style="color:var(--ink-faint);font-weight:400;">— ${esc(client.name)}</span></div><div class="meta">Renews annually — confirm next year's premium with the insurer</div></div></div><div class="reminder-meta"><div class="date">${fmtDate(p.premiumDueDate)}</div><div style="margin-top:3px;"><span class="badge neutral">${d===0?'Today':monthsAway>=1?'~'+monthsAway+'mo away':'in '+d+'d'}</span></div><div style="margin-top:3px;"><button class="btn btn-ghost btn-sm" data-action="log-contact" data-id="${client.id}">${icon('check')} Log contact</button></div></div></div>`;
}
function birthdayRow(c, days, turningAge){
  const dLabel = days === 0 ? 'Today' : days === 1 ? 'Tomorrow' : 'in ' + days + 'd';
  return `<div class="reminder-row"><div class="reminder-main"><span class="reminder-dot" style="background:var(--amber)"></span><div class="reminder-text"><div class="name">${esc(c.name)}</div><div class="meta">Birthday · turning ${turningAge}</div></div></div><div class="reminder-meta"><div class="date">${dLabel}</div><div style="margin-top:3px;"><button class="btn btn-ghost btn-sm" data-action="log-contact" data-id="${c.id}">${icon('check')} Log contact</button></div></div></div>`;
}
function touchRow(c, days){
  const label = days === Infinity ? 'Never logged' : days + 'd since last contact';
  return `<div class="reminder-row"><div class="reminder-main"><span class="reminder-dot" style="background:var(--ink-faint)"></span><div class="reminder-text"><div class="name" data-action="view-client" data-id="${c.id}" style="cursor:pointer;">${esc(c.name)}</div><div class="meta">${(c.policies||[]).length} polic${(c.policies||[]).length===1?'y':'ies'} on file</div></div></div><div class="reminder-meta"><div class="date">${label}</div><div style="margin-top:3px;"><button class="btn btn-ghost btn-sm" data-action="log-contact" data-id="${c.id}">${icon('check')} Log contact</button></div></div></div>`;
}
function withdrawalRow(p, client, d){
  const submitDue = d - 30;
  const submitDeadlineIso = new Date(new Date(p.partialWithdrawalDate + 'T00:00:00').getTime() - 30 * 86400000).toISOString().slice(0,10);
  let sCls, sLabel;
  if(submitDue < -7){ sCls = 'neutral'; sLabel = 'Withdrawal passed'; }
  else if(submitDue < 0){ sCls = 'danger'; sLabel = 'Form overdue — submit now!'; }
  else if(submitDue === 0){ sCls = 'danger'; sLabel = 'Submit form today'; }
  else if(submitDue <= 7){ sCls = 'danger'; sLabel = 'Submit form this week'; }
  else if(submitDue <= 21){ sCls = 'warn'; sLabel = 'Submit form soon'; }
  else { sCls = 'neutral'; sLabel = 'Planned'; }
  const submitLabel = submitDue < 0 ? Math.abs(submitDue)+'d overdue to submit' : submitDue === 0 ? 'Submit today' : 'Submit in '+submitDue+'d';
  const amt = p.partialWithdrawalAmount ? 'S$ '+Number(p.partialWithdrawalAmount).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
  return `<div class="reminder-row"><div class="reminder-main"><span class="reminder-dot" style="background:var(--amber)"></span><div class="reminder-text"><div class="name">${esc(p.name)} <span style="color:var(--ink-faint);font-weight:400;">— ${esc(client.name)}</span></div><div class="meta">Partial withdrawal ${amt} on ${fmtDate(p.partialWithdrawalDate)}${p.partialWithdrawalPurpose ? ' · <em>'+esc(p.partialWithdrawalPurpose)+'</em>' : ''}</div><div class="meta" style="color:var(--amber);margin-top:2px;font-weight:500;">Submit form by ${fmtDate(submitDeadlineIso)} · 5–7 working days processing</div></div></div><div class="reminder-meta"><div><span class="badge ${sCls}">${sLabel}</span></div><div class="date" style="margin-top:5px;">${submitLabel}</div></div></div>`;
}
function mixRow(cat, v, maxCount){
  const pct = maxCount ? Math.round((v.count / maxCount) * 100) : 0;
  const color = catColor(cat);
  return `<div class="mix-row"><div class="mix-label"><span class="swatch" style="background:${color}"></span>${esc(cat)}</div><div class="mix-bar-track"><div class="mix-bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="mix-count">${v.count} · ${money(v.premium)}/yr</div></div>`;
}
function emptyInline(msg){ return `<p style="color:var(--ink-faint);font-size:13.5px;padding:10px 0;">${msg}</p>`; }

/* ============================== CLIENTS LIST ============================== */
function renderClientsList(main){
  const q = (view.search || '').toLowerCase();
  const catFilter = view.catFilter || '';
  let list = clients.filter(c => {
    const matchesQ = !q || c.name.toLowerCase().includes(q);
    const matchesCat = !catFilter || (c.policies||[]).some(p => p.category === catFilter);
    return matchesQ && matchesCat;
  }).sort((a,b) => a.name.localeCompare(b.name));
  main.innerHTML = `
    <div class="topbar"><div><h1>Clients</h1><div class="sub">${clients.length} on file</div></div><div class="topbar-actions"><button class="btn btn-primary" data-action="open-client-form">${icon('plus')} Add client</button></div></div>
    <div class="content">
      <div class="toolbar">
        <div class="search-box">${icon('search')}<input id="clientSearch" placeholder="Search by name…" value="${esc(view.search||'')}"></div>
        <select class="filter-select" id="catFilterSelect"><option value="">All categories</option>${categories.map(c => `<option value="${esc(c)}" ${c===catFilter?'selected':''}>${esc(c)}</option>`).join('')}</select>
      </div>
      <div class="panel"><div class="panel-body">${clients.length === 0 ? emptyState('people') : list.length === 0 ? emptyInline('No clients match your search.') : `<div class="list-head"><span class="col-label">Client</span><span class="col-label">DOB</span><span class="col-label">Next due</span><span></span></div><div class="client-list">${list.map(c => clientRow(c)).join('')}</div>`}</div></div>

function preserveFocus(id){ const el = document.getElementById(id); if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; } }
function clientRow(c){
  const policies = c.policies || [];

  const age = calcAge(c.dob);
  return `<div class="client-row" data-action="view-client" data-id="${c.id}"><div><div class="client-name">${esc(c.name)}</div><div class="client-sub">${inForceCount} of ${policies.length} polic${policies.length===1?'y':'ies'} in force</div></div><div class="mono-id">${fmtDate(c.dob)}${age!==null ? ' ('+age+')' : ''}</div><div>${next ? `<span class="badge ${next.d<0?'danger':next.d<=14?'warn':'neutral'}">${fmtDate(next.p.premiumDueDate)}</span>` : `<span class="badge ok">None due</span>`}</div><div style="text-align:right;color:var(--ink-faint);width:16px;height:16px;margin-left:auto;">${icon('chevron')}</div></div>`;
}
function emptyState(kind){ return `<div class="empty-state">${icon('inbox')}<h3>No clients yet</h3><p>Add your first client to start building their policy file.</p><button class="btn btn-primary" data-action="open-client-form">${icon('plus')} Add client</button></div>`; }

          <button class="icon-btn" data-action="open-client-form" data-id="${c.id}" title="Edit client">${icon('edit')}</button>

function policyCard(c, p){
  const ps = premiumStatus(p);
  const es = expiryStatus(p);
  const status = p.status || 'In Force';
  const statusCls = status === 'In Force' ? 'ok' : status === 'Lapsed' ? 'danger' : 'neutral';
  return `<div class="policy-card" style="border-left-color:${catColor(p.category)}"><div class="policy-top"><div><div class="policy-title">${esc(p.name)}</div><div class="policy-insurer">${esc(p.insurer||'—')} ${p.policyNumber ? '· '+esc(p.policyNumber) : ''}</div></div><div class="policy-actions"><span class="badge ${statusCls}">${esc(status)}</span><span class="badge neutral" style="background:${catColor(p.category)}22;color:${catColor(p.category)};">${esc(p.category||'Uncategorised')}</span><button class="icon-btn" data-action="open-policy-form" data-client="${c.id}" data-policy="${p.id}" title="Edit">${icon('edit')}</button><button class="icon-btn" data-action="delete-policy" data-client="${c.id}" data-policy="${p.id}" title="Delete">${icon('trash')}</button></div></div><div class="policy-dates"><div><span class="col-label">Inception</span><span class="val">${fmtDate(p.inceptionDate)}</span></div><div><span class="col-label">Expiry</span><span class="val">${fmtDate(p.expiryDate)} ${es?`<span class="badge ${es.cls}" style="margin-left:6px;">${es.label}</span>`:''}</span></div><div><span class="col-label">Maturity</span><span class="val">${HOSPITAL_INSURANCE_PRODUCTS.includes(p.name) ? 'N/A — renews annually' : fmtDate(p.maturityDate)}</span></div><div><span class="col-label">Premium due</span><span class="val">${p.premiumFrequency==='Single Premium' ? 'N/A' : fmtDate(p.premiumDueDate)} ${ps?`<span class="badge ${ps.cls}" style="margin-left:6px;">${ps.label}</span>`:''}</span></div></div><div class="policy-foot"><div><span class="premium-amt">${p.premiumAmount ? 'S$ '+Number(p.premiumAmount).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</span><span class="premium-freq"> / ${esc(p.premiumFrequency||'—')}</span>${paymentMethodList(p).length ? `<span class="premium-freq"> · via ${esc(formatPaymentMethods(p))}</span>` : ''}${p.lastPaidDate ? `<span class="premium-freq"> · last paid ${fmtDate(p.lastPaidDate)}</span>` : ''}</div><div style="display:flex;gap:8px;">${p.premiumFrequency!=='Single Premium' && p.premiumDueDate ? `<button class="btn btn-ghost btn-sm" data-action="mark-paid" data-client="${c.id}" data-policy="${p.id}">${icon('check')} Mark premium paid</button>` : ''}</div></div>${isPulsarPolicy(p) && p.partialWithdrawalDate ? `<div style="margin-top:10px;padding:10px 14px;background:var(--amber-soft);border-radius:8px;font-size:13px;"><span style="font-weight:700;color:var(--amber);">Partial Withdrawal Planned</span> · S$ ${Number(p.partialWithdrawalAmount||0).toLocaleString(undefined,{minimumFractionDigits:2})} on ${fmtDate(p.partialWithdrawalDate)}${p.partialWithdrawalPurpose ? ' · '+esc(p.partialWithdrawalPurpose) : ''}<br><span style="color:var(--ink-soft);font-size:12px;">Submit form by ${fmtDate(new Date(new Date(p.partialWithdrawalDate+'T00:00:00').getTime()-30*86400000).toISOString().slice(0,10))} · 5–7 working days processing</span></div>` : ''}</div>`;
}

/* ============================== SETTINGS ============================== */
function renderSettings(main){
  main.innerHTML = `
    <div class="topbar"><div><h1>Settings</h1><div class="sub">Used as the letterhead on exported PDF summaries.</div></div></div>
    <div class="content">
      <div class="panel" style="max-width:480px;margin-bottom:18px;"><div class="panel-body"><div class="form-grid single"><div class="form-group"><label>Your name</label><input id="setAdvisor" value="${esc(settings.advisorName)}" placeholder="e.g. Tan Wei Ming"></div><div class="form-group"><label>Firm / agency</label><input id="setFirm" value="${esc(settings.firmName)}" placeholder="e.g. Horizon Financial Advisory"></div><div class="form-group"><label>Contact (phone or email)</label><input id="setContact" value="${esc(settings.contact)}" placeholder="e.g. 9123 4567"></div></div><div class="modal-foot" style="border-top:none;justify-content:flex-start;padding-top:14px;"><button class="btn btn-primary" data-action="save-settings">Save settings</button></div></div></div>
      <div class="panel" style="max-width:480px;margin-bottom:18px;"><div class="panel-head"><h2>Backup &amp; restore</h2></div><div class="panel-body"><div style="display:flex;gap:10px;flex-wrap:wrap;"><button class="btn btn-ghost" data-action="export-backup">${icon('printer')} Download backup</button><button class="btn btn-ghost" data-action="import-backup">${icon('plus')} Restore from file</button></div><input type="file" id="backupImportInput" accept=".json" style="display:none;"><p style="font-size:12px;color:var(--ink-faint);margin-top:10px;">Download saves all clients and policies as a JSON file. Restore replaces all current data with the file's contents.</p></div></div>
    </div>
  `;
  document.getElementById('backupImportInput').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if(!file) return;
    try{
      const text = await file.text(); const bundle = JSON.parse(text);
      if(!Array.isArray(bundle.clients)) throw new Error('Invalid backup file — missing clients array.');
      const ok = await confirmModal('Restore from backup?', 'This will replace all your current data with the backup file. This cannot be undone.');
      if(!ok){ e.target.value = ''; return; }
      clients = bundle.clients || []; categories = bundle.categories || [];
      if(bundle.settings) Object.assign(settings, bundle.settings);
      await saveClients(); await saveCategories(); await saveSettings();
      toast('Data restored — ' + clients.length + ' client(s) loaded.');
      view = { type: 'dashboard' }; render();
    }catch(err){ toast('Could not read that file: ' + (err.message || err), 'danger'); }
    e.target.value = '';
  });
}
function exportBackup(){
  const bundle = { clients, categories, settings };
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href = url; a.download = 'casebook-backup.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
async function saveSettingsForm(){
  settings.advisorName = document.getElementById('setAdvisor').value.trim();
  settings.firmName = document.getElementById('setFirm').value.trim();
  settings.contact = document.getElementById('setContact').value.trim();
  await saveSettings(); toast('Settings saved.');
}

async function submitPolicyForm(){
  try{
    const f = new FormData(document.getElementById('policyForm'));
    const { clientId, policyId } = editingPolicy; const c = findClient(clientId);
    let category = (f.get('category')||'').trim(); const newCategory = (f.get('newCategory')||'').trim();
    if(newCategory){ category = newCategory; if(!categories.includes(newCategory)){ categories.push(newCategory); await saveCategories(); } }
    let insurer = f.get('insurer')||''; const insurerOther = (f.get('insurerOther')||'').trim(); if(insurerOther) insurer = insurerOther;
    const inception = parseDateField(f.get('inceptionDate')); const expiry = parseDateField(f.get('expiryDate'));
    const policyNameRaw = (f.get('name')||'').trim(); const isHospitalPlan = HOSPITAL_INSURANCE_PRODUCTS.includes(policyNameRaw);
    const maturity = isHospitalPlan ? { iso:'', unrecognised:false } : parseDateField(f.get('maturityDate'));
    const isSingle = f.get('premiumFrequency')==='Single Premium'; const premDue = isSingle ? { iso:'', unrecognised:false } : parseDateField(f.get('premiumDueDate'));
    const unrecognisedDates = [];
    if(inception.unrecognised) unrecognisedDates.push('Inception date'); if(expiry.unrecognised) unrecognisedDates.push('Expiry date'); if(maturity.unrecognised) unrecognisedDates.push('Maturity date'); if(premDue.unrecognised) unrecognisedDates.push('Premium due date');
    const selectedPaymentMethods = f.getAll('paymentMethod').map(m => ({ method: m, amount: f.get('pmAmount__' + m) || '' }));
    const data = { name: (f.get('name')||'').trim(), category, insurer, policyNumber: (f.get('policyNumber')||'').trim(), status: f.get('status')||'In Force', inceptionDate: inception.iso, expiryDate: expiry.iso, maturityDate: maturity.iso, paymentMethod: selectedPaymentMethods, premiumFrequency: f.get('premiumFrequency')||'Monthly', premiumDueDate: premDue.iso, premiumAmount: f.get('premiumAmount')||'', sumAssured: f.get('sumAssured')||'', notes: (f.get('notes')||'').trim() };
    if(isPulsarPolicy(data)){
      const pwDate = parseDateField(f.get('partialWithdrawalDate'));
      if(pwDate.unrecognised) unrecognisedDates.push('Partial withdrawal date');
      data.partialWithdrawalAmount = f.get('partialWithdrawalAmount') || '';
      data.partialWithdrawalDate = pwDate.iso;
      data.partialWithdrawalPurpose = (f.get('partialWithdrawalPurpose') || '').trim();
    } else {
      data.partialWithdrawalAmount = ''; data.partialWithdrawalDate = ''; data.partialWithdrawalPurpose = '';
    }
    if(!data.name){ toast('Please fill in the required field: Policy / product name.', 'danger'); const nameInput = document.getElementById('policyNameInput'); if(nameInput){ nameInput.style.borderColor = 'var(--red)'; nameInput.focus(); nameInput.addEventListener('input', () => { nameInput.style.borderColor = ''; }, { once: true }); } return; }
    c.policies = c.policies || [];
    if(policyId){ const p = c.policies.find(x=>x.id===policyId); Object.assign(p, data); }
    else { c.policies.push({ id: uid(), ...data, lastPaidDate: '' }); }
    await saveOneClient(c); closeModal();
    if(unrecognisedDates.length){ toast("Saved, but these dates weren't recognised and were left blank: " + unrecognisedDates.join(', ') + '.', 'danger'); }
    else { toast(policyId ? 'Policy updated.' : 'Policy added.'); }
    renderClientDetail(document.getElementById('mainContent'));
  }catch(err){ toast('Something went wrong saving this policy: ' + (err && err.message ? err.message : err), 'danger'); }
}
async function deletePolicy(clientId, policyId){
  const c = findClient(clientId); const p = (c.policies||[]).find(x=>x.id===policyId); if(!p) return;
  const ok = await confirmModal('Delete "' + p.name + '"?', "This removes the policy from this client's file permanently."); if(!ok) return;
  c.policies = c.policies.filter(x => x.id !== policyId); await saveOneClient(c); toast('Policy deleted.'); renderClientDetail(document.getElementById('mainContent'));
}
async function markPaid(clientId, policyId){
  const c = findClient(clientId); const p = (c.policies||[]).find(x=>x.id===policyId); if(!p || !p.premiumDueDate) return;
  const d = new Date(p.premiumDueDate + 'T00:00:00'); const map = { 'Monthly':1, 'Quarterly':3, 'Semi-Annually':6, 'Annually':12 }; const months = map[p.premiumFrequency] || 1;
  d.setMonth(d.getMonth() + months); p.lastPaidDate = new Date().toISOString().slice(0,10); p.premiumDueDate = d.toISOString().slice(0,10);
  await saveOneClient(c); toast('Marked paid — next due ' + fmtDate(p.premiumDueDate)); render();
}
async function markContact(clientId){
  const c = findClient(clientId); if(!c) return;
  c.lastContactedDate = new Date().toISOString().slice(0,10); await saveOneClient(c); toast('Logged contact with ' + c.name + '.'); render();
}

function showModal(innerHtml, opts){
  closeModal(); const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.id = 'activeModalOverlay';
  overlay.innerHTML = `<div class="modal ${opts?.small?'small':''} ${opts?.wide?'wide':''}">${innerHtml}</div>`;
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); }); document.body.appendChild(overlay);
}
function closeModal(){ document.getElementById('activeModalOverlay')?.remove(); }
function confirmModal(title, body){
  return new Promise(resolve => {
    showModal(`<h2>${esc(title)}</h2><div class="modal-sub">${esc(body)}</div><div class="modal-foot"><button class="btn btn-ghost" id="cmCancel">Cancel</button><button class="btn btn-danger" id="cmOk">Delete</button></div>`, { small: true });
    document.getElementById('cmCancel').onclick = () => { closeModal(); resolve(false); };
    document.getElementById('cmOk').onclick = () => { closeModal(); resolve(true); };
  });
}

// Auto-correct any fund whose stored ISIN / currency doesn't match the confirmed table.
// Returns true if anything changed (so the caller knows to save).
function fixFundIsins(inv){
  var changed = false;
  (inv.funds || []).forEach(function(f){
    var nameLower = (f.name || '').toLowerCase();
    for(var i = 0; i < HSBC_ISIN_MAP.length; i++){
      var entry = HSBC_ISIN_MAP[i];
      if(nameLower.indexOf(entry.match) !== -1){
        if(f.isin !== entry.isin){ f.isin = entry.isin; changed = true; }
        if((f.currency || '').toUpperCase() !== entry.currency){ f.currency = entry.currency; changed = true; }
        break;
      }
    }
  });
  return changed;
}

async function fetchFxRates(){
  // open.er-api.com is free, CORS-enabled, no key needed — returns rates vs SGD base
  try{
    const r = await fetch('https://open.er-api.com/v6/latest/SGD');
    if(!r.ok) return null;
    const j = await r.json();
    return j.result === 'success' ? j.rates : null;
  }catch(e){ return null; }
}

// Per-fund SGD value. Falls back to the last known / purchase NAV when no live
// price exists (most HSBC Life ILP sub-funds are insurer-internal share classes
// and are never listed on Financial Times, so a live match should be the
// exception, not a requirement) — a fund must never be silently dropped from
// the total just because it has no live quote.
function fundValueSGD(f, fxRates){
  const units = Number(f.units||0);
  if(!units) return null;
  const liveNav = Number(f.latestNav||0);
  const nav = liveNav || Number(f.purchaseNav||0);
  if(!nav) return null;
  const ccy = (f.currency||'SGD').toUpperCase();
  // fxRates is keyed by currency code, values are "units of that ccy per 1 SGD"
  // e.g. fxRates.USD = 0.74 means 1 SGD = 0.74 USD, so 1 USD = 1/0.74 SGD
  const rate = ccy === 'SGD' ? 1 : (fxRates && fxRates[ccy] ? 1 / fxRates[ccy] : null);
  if(rate === null) return null;
  return { valueSGD: units * nav * rate, usedLive: !!liveNav, nav: nav, ccy: ccy };
}

function computeAutoCashValue(inv, fxRates){
  if(!fxRates || !inv.funds || !inv.funds.length) return null;
  let total = 0, hasVal = false, liveCount = 0, totalCount = 0;
  (inv.funds||[]).forEach(function(f){
    if(!Number(f.units||0)) return; // skip exited (zero-unit) funds from live count
    const r = fundValueSGD(f, fxRates);
    if(!r) return;
    total += r.valueSGD; hasVal = true; totalCount++;
    if(r.usedLive) liveCount++;
  });
  return hasVal ? { value: parseFloat(total.toFixed(2)), liveCount: liveCount, totalCount: totalCount } : null;
}

async function refreshPrices(invId, silent){
  const inv = investments.find(i => i.id === invId);
  if(!inv || !inv.funds || !inv.funds.length) return;
  fixFundIsins(inv); // auto-correct any known-wrong ISINs / currencies before fetching
  const symbols = inv.funds.filter(f => f.isin && f.currency).map(f => `${f.isin}:${f.currency}`);
  const btn = document.querySelector(`[data-action="refresh-prices"][data-id="${invId}"]`);
  if(btn) btn.querySelector('svg')?.classList.add('spinning');
  try{
    const [navRes, fxRates] = await Promise.all([
      symbols.length ? fetch(`${WORKER_URL}?symbols=${symbols.join(',')}`) : Promise.resolve(null),
      fetchFxRates()
    ]);
    if(navRes){
      if(!navRes.ok) throw new Error('Worker HTTP ' + navRes.status);
      const json = await navRes.json();
      if(!json.ok) throw new Error(json.error || 'Worker error');
      inv.funds.forEach(f => {
        const sym = `${f.isin}:${f.currency}`;
        const d = json.data[sym];
        if(d && d.price){ f.latestNav = d.price; f.navDate = d.priceDate; f.navName = d.name; }
      });
    }
    inv.lastRefreshed = new Date().toISOString();
    inv.fxRates = fxRates || inv.fxRates || null; // persist so render-time fund table can use live FX too
    // auto-compute cash value — only overwrite if user hasn't manually set it
    if(inv.cashValueSource !== 'manual'){
      const auto = computeAutoCashValue(inv, fxRates);
      if(auto !== null){
        inv.cashValue = auto.value;
        inv.cashValueDate = new Date().toISOString().slice(0,10);
        inv.cashValueSource = 'auto';
        inv.navLiveCount = auto.liveCount;
        inv.navTotalCount = auto.totalCount;
      }
    }
    await saveOneInvestment(inv);
    if(!silent){
      const live = inv.navLiveCount||0, tot = inv.navTotalCount||0;
      if(tot && live < tot){
        toast('Updated — only '+live+' of '+tot+' funds have a live market price (HSBC ILP sub-funds aren\'t on public feeds). The rest use last known NAV, so this total is an estimate. Enter the official Cash Value from the HSBC portal for an exact figure.', 'warn');
      } else {
        toast('Prices and cash value updated.');
      }
    }
    if(view.type === 'investments' || view.type === 'investment-detail') render();
  }catch(e){
    if(!silent) toast('Refresh failed: ' + e.message, 'danger');
  }finally{
    if(btn) btn.querySelector('svg')?.classList.remove('spinning');
  }
}

async function refreshAllPrices(){
  const btn = document.querySelector('[data-action="refresh-all-prices"]');
  if(btn){ btn.disabled = true; btn.querySelector('svg')?.classList.add('spinning'); }
  await Promise.allSettled(investments.map(inv => refreshPrices(inv.id, true)));
  if(btn){ btn.disabled = false; btn.querySelector('svg')?.classList.remove('spinning'); }
  toast('All portfolios refreshed.');
  if(view.type === 'investments' || view.type === 'investment-detail') render();
}

/* ============================== INVESTMENTS — RENDER ============================== */
function fmtMoney(n, dec){
  dec = dec == null ? 2 : dec;
  if(n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-SG', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtPct(n){
  if(n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function perfClass(n){ return n == null || isNaN(n) ? 'perf-flat' : n > 0 ? 'perf-gain' : n < 0 ? 'perf-loss' : 'perf-flat'; }

function investmentCard(inv){
  const funds = inv.funds || [];
  var totalInvested = 0, totalValue = 0;
  funds.forEach(function(f){
    totalInvested += Number(f.units||0) * Number(f.purchaseNav||0);
    totalValue += Number(f.units||0) * Number(f.latestNav || f.purchaseNav || 0);
  });
  const linkedPremCard = getLinkedPremiums(inv);
  var premiumsSGD = linkedPremCard ? linkedPremCard.total : 0;
  if(!premiumsSGD){ funds.forEach(function(f){ premiumsSGD += Number(f.costSGD||0); }); }
  if(!premiumsSGD){
    const PREM = ['basic regular premium','bonus unit','single premium','top-up','top up'];
    (inv.transactions||[]).forEach(function(t){
      if(PREM.some(function(k){ return (t.type||'').toLowerCase().includes(k); }))
        premiumsSGD += Math.abs(Number(t.amount)||0);
    });
  }
  // SGD account value: units × NAV (live, falling back to purchase NAV) × live FX
  var accountValSGD = 0;
  if(inv.fxRates) funds.forEach(function(f){
    const r = fundValueSGD(f, inv.fxRates);
    if(r) accountValSGD += r.valueSGD;
  });
  const displayAccountVal = Number(inv.cashValue||0) > 0 ? Number(inv.cashValue) : (accountValSGD > 0 ? accountValSGD : 0);
  const displayInvested = premiumsSGD > 0 ? premiumsSGD : totalInvested;
  const gainSGDCard = displayAccountVal > 0 && displayInvested > 0 ? displayAccountVal - displayInvested : null;
  const gainSGDPctCard = gainSGDCard !== null && displayInvested > 0 ? gainSGDCard / displayInvested * 100 : null;
  const clientName = (clients.find(function(c){ return c.id === inv.clientId; }) || {}).name || inv.clientId || '—';
  return '<div class="card" style="cursor:pointer;padding:18px 20px;" data-action="view-investment" data-id="'+esc(inv.id)+'">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">'
    +'<div><div style="font-weight:700;font-size:15px;">'+esc(inv.product)+'</div>'
    +'<div style="font-size:12px;color:var(--ink-faint);margin-top:2px;">'+esc(clientName)+' · Policy No: '+esc(inv.policyNo||'—')+'</div></div>'
    +'<button class="btn btn-sm" data-action="refresh-prices" data-id="'+esc(inv.id)+'" title="Refresh NAV" style="padding:6px 8px;">'+icon('refresh')+'</button>'
    +'</div>'
    +'<div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;">'
    +'<div><div style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.5px;">'+(premiumsSGD>0?'Premiums Paid':'Invested')+'</div><div style="font-size:16px;font-weight:700;">SGD '+fmtMoney(displayInvested)+'</div></div>'
    +(displayAccountVal > 0
      ? '<div><div style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.5px;">Account Value (SGD)</div><div style="font-size:16px;font-weight:700;">SGD '+fmtMoney(displayAccountVal)+'</div>'
        +(Number(inv.cashValue||0) > 0 ? '<div style="font-size:10px;color:var(--ink-faint);">'+(inv.cashValueSource==='manual'?'manual override':' auto · live FX')+(inv.cashValueDate ? ' · '+esc(inv.cashValueDate) : '')+'</div>' : '')+'</div>'
        +(gainSGDCard !== null ? '<div><div style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.5px;">Gain / Loss</div><div style="font-size:16px;font-weight:700;" class="'+perfClass(gainSGDCard)+'">'+(gainSGDCard>=0?'+':'')+fmtMoney(gainSGDCard)+'<br><small>'+fmtPct(gainSGDPctCard)+'</small></div></div>' : '')
      : '')
    +'</div>'
    +(Number(inv.cashValue||0) > 0
      ? '<div style="font-size:11px;color:'+(inv.cashValueSource!=='manual' && inv.navTotalCount && inv.navLiveCount < inv.navTotalCount ? 'var(--amber)' : 'var(--ink-faint)')+';margin-top:8px;">'+(inv.cashValueSource==='manual'?'Manual override from HSBC portal':('Auto-estimate · units × NAV × live FX'+(inv.navTotalCount ? ' · '+(inv.navLiveCount||0)+'/'+inv.navTotalCount+' funds live-priced' : '')))+(inv.cashValueDate ? ' · '+esc(inv.cashValueDate) : '')+'</div>'
      : inv.lastRefreshed ? '<div style="font-size:11px;color:var(--ink-faint);margin-top:8px;">NAV refreshed: '+new Date(inv.lastRefreshed).toLocaleString('en-SG')+'</div>' : '<div style="font-size:11px;color:var(--amber);margin-top:8px;">Refresh NAV to auto-calculate cash value</div>')
    +'</div>';
}

function parseCSV(text){
  text = text.replace(/^﻿/, '').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const allLines = text.split('\n');
  // auto-detect the actual header row (HSBC files have 7 lines of company info before the data)
  let headerIdx = 0;
  for(var i = 0; i < Math.min(allLines.length, 25); i++){
    const low = allLines[i].toLowerCase();
    if(low.includes('fund name') || low.includes('transaction date') || low.includes('fund code')){
      headerIdx = i; break;
    }
  }
  const lines = allLines.slice(headerIdx).filter(function(l){ return l.trim() && !/^,+$/.test(l.trim()); });
  if(lines.length < 2) return { headers:[], rows:[] };
  const rawHeaders = splitCSVRow(lines[0]);
  const headers = rawHeaders.map(function(h){ return h.replace(/^"|"$/g,'').trim().toLowerCase().replace(/[^a-z0-9 %.]/g,' ').replace(/\s+/g,' ').trim(); });
  const rows = lines.slice(1).map(function(line){
    const vals = splitCSVRow(line);
    const row = {};
    headers.forEach(function(h, i){ row[h] = (vals[i]||'').replace(/^"|"$/g,'').trim(); });
    return row;
  });
  return { headers: headers, rows: rows };
}
function normalizeDate(d){
  if(!d) return '';
  // M/D/YYYY or MM/DD/YYYY → YYYY-MM-DD
  const slash = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(slash) return slash[3]+'-'+slash[1].padStart(2,'0')+'-'+slash[2].padStart(2,'0');
  // D/M/YYYY with 4-digit year already covered above; also handle DD-MM-YYYY
  const dash = d.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if(dash) return dash[3]+'-'+dash[1].padStart(2,'0')+'-'+dash[2].padStart(2,'0');
  return d; // already ISO or unknown — pass through
}
function splitCSVRow(line){
  const result = []; let inQuote = false, cur = '';
  for(var i = 0; i < line.length; i++){
    const ch = line[i];
    if(ch === '"'){ inQuote = !inQuote; }
    else if(ch === ',' && !inQuote){ result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur); return result;
}
// find a value from a row trying multiple possible column name aliases
function col(row, aliases){
  for(var i=0;i<aliases.length;i++){
    const v = row[aliases[i]];
    if(v !== undefined && v !== '') return v;
  }
  return '';
}

        const fundCode = col(r,['fund code','isin','isin code']).toUpperCase();

          isin: fundCode,
          type: txType || 'Transaction',

function recomputeHoldingsFromTransactions(inv){
  if(!inv.transactions || !inv.transactions.length) return;
  const fundMap = {};
  inv.transactions.forEach(function(t){
    if(!t.fundName) return;
    const key = t.isin || t.fundName;
    if(!fundMap[key]){
      // extract currency from fund name e.g. "AB Low Volatility Equity Fund (USD)" → USD
      // "BlackRock World Gold Fund (SGD Hedged)" → SGD
      const currMatch = t.fundName.match(/\(([A-Z]{3})(?:\s+Hedged)?\)/);
      fundMap[key] = {
        name: t.fundName, isin: t.isin||'',
        currency: currMatch ? currMatch[1] : (inv.currency||'SGD'),
        netUnits: 0, posUnits: 0, posCost: 0, costSGD: 0, latestPrice: 0
      };
    }
    const fm = fundMap[key];
    const u = Number(t.units)||0;
    const p = Number(t.price)||0;
    fm.netUnits += u;
    if(u > 0){
      fm.posUnits += u;
      fm.posCost += u * p;                        // fund-currency cost
      fm.costSGD += Math.abs(Number(t.amount)||0); // SGD cost from policy currency column
    }
    if(p > 0) fm.latestPrice = p;
    if(t.isin && !fm.isin) fm.isin = t.isin;
  });
  const prevFunds = inv.funds || [];
  inv.funds = Object.keys(fundMap).map(function(key){
    const fm = fundMap[key];
    const existing = prevFunds.find(function(f){
      return (fm.isin && f.isin && f.isin===fm.isin) || f.name.toLowerCase()===fm.name.toLowerCase();
    });
    const weightedAvgNav = fm.posUnits > 0 ? parseFloat((fm.posCost / fm.posUnits).toFixed(6)) : 0;
    const netUnits = parseFloat(Math.max(0, fm.netUnits).toFixed(6));
    return {
      id: existing ? existing.id : uid(),
      name: fm.name,
      isin: fm.isin || (existing ? existing.isin||'' : ''),
      currency: fm.currency,
      units: netUnits,
      purchaseNav: weightedAvgNav,
      costSGD: parseFloat(fm.costSGD.toFixed(2)),
      latestNav: existing && existing.latestNav ? existing.latestNav : null,
      allocationPct: existing ? existing.allocationPct||null : null,
      navDate: existing ? existing.navDate||null : null,
      navName: existing ? existing.navName||null : null,
    };
  });
}

function calcPremiumsPaid(policy){
  if(!policy || !policy.premiumAmount) return { total: 0, numPayments: 0 };
  const amount = Number(policy.premiumAmount);
  if(policy.premiumFrequency === 'Single Premium') return { total: amount, numPayments: 1 };
  if(!policy.inceptionDate) return { total: 0, numPayments: 0 };
  const start = new Date(policy.inceptionDate + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  if(start > today) return { total: 0, numPayments: 0 };
  const monthsDiff = (today.getFullYear() - start.getFullYear()) * 12 + (today.getMonth() - start.getMonth());
  const MPP = { Monthly:1, Quarterly:3, 'Semi-Annually':6, Annually:12 };
  const mpp = MPP[policy.premiumFrequency] || 1;
  const numPayments = Math.floor(monthsDiff / mpp) + 1;
  return { total: parseFloat((numPayments * amount).toFixed(2)), numPayments: numPayments };
}

    + client.policies.map(function(p){
        const label = esc(p.name) + (p.policyNumber ? ' · '+esc(p.policyNumber) : '')
          + (p.inceptionDate ? ' (from '+esc(fmtDate(p.inceptionDate))+')' : '');

function getLinkedPremiums(inv){
  const client = clients.find(function(c){ return c.id === inv.clientId; });
  if(!client) return null;
  const policies = client.policies || [];
  let policy = null;
  // 1. explicit link
  if(inv.linkedPolicyId)
    policy = policies.find(function(p){ return p.id === inv.linkedPolicyId; });
  // 2. match by policy number
  if(!policy && inv.policyNo)
    policy = policies.find(function(p){ return p.policyNumber && p.policyNumber.trim() === inv.policyNo.trim(); });
  // 3. match by product name
  if(!policy && inv.product)
    policy = policies.find(function(p){ return p.name && p.name.toLowerCase().includes(inv.product.toLowerCase()); });
  if(!policy) return null;
  return calcPremiumsPaid(policy);
}

  const inv = investments.find(function(i){ return i.id === invId; });
  if(!inv) return;
  const fund = fundId ? (inv.funds||[]).find(function(f){ return f.id === fundId; }) : null;
  const currOpts = ['USD','SGD','HKD','EUR','GBP'].map(function(c){
    return '<option value="'+c+'"'+(fund && fund.currency===c ? ' selected' : '')+'>'+c+'</option>';
  }).join('');
  showModal('<div class="modal-header"><h3>'+(fund ? 'Edit' : 'Add')+' Fund</h3><button class="icon-btn" data-action="close-modal">&#x2715;</button></div>'
    +'<form id="fundForm">'
    +'<label>Fund Name<input name="name" value="'+esc(fund ? fund.name||'' : '')+'" placeholder="e.g. Fidelity Global Technology" required></label>'
    +'<label style="margin-top:12px;">ISIN <span style="color:var(--ink-faint);font-size:11px;">(for live NAV)</span><input name="isin" value="'+esc(fund ? fund.isin||'' : '')+'" placeholder="e.g. LU0095077415" style="text-transform:uppercase;"></label>'
    +'<label style="margin-top:12px;">Fund Currency<select name="currency" style="margin-top:4px;">'+currOpts+'</select></label>'
    +'<label style="margin-top:12px;">Units Held<input name="units" type="number" step="0.0001" min="0" value="'+(fund ? fund.units||'' : '')+'" placeholder="e.g. 1500.5" required></label>'
    +'<label style="margin-top:12px;">Purchase NAV (per unit)<input name="purchaseNav" type="number" step="0.0001" min="0" value="'+(fund ? fund.purchaseNav||'' : '')+'" placeholder="e.g. 12.3456" required></label>'
    +'<label style="margin-top:12px;">Latest NAV <span style="color:var(--ink-faint);font-size:11px;">(auto-filled on refresh)</span><input name="latestNav" type="number" step="0.0001" min="0" value="'+(fund ? fund.latestNav||'' : '')+'"></label>'
    +'<label style="margin-top:12px;">Allocation % <span style="color:var(--ink-faint);font-size:11px;">(optional)</span><input name="allocationPct" type="number" step="0.01" min="0" max="100" value="'+(fund ? fund.allocationPct||'' : '')+'" placeholder="e.g. 30"></label>'
    +'<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">'
    +'<button type="button" class="btn btn-sm" data-action="close-modal">Cancel</button>'
    +'<button type="submit" class="btn btn-primary">Save Fund</button>'
    +'</div></form>');
  document.getElementById('fundForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const fd = new FormData(e.target);
    const fdata = {
      id: fund ? fund.id : uid(),
      name: fd.get('name'), isin: (fd.get('isin')||'').toUpperCase(),
      currency: fd.get('currency'), units: parseFloat(fd.get('units')),
      purchaseNav: parseFloat(fd.get('purchaseNav')),
      latestNav: fd.get('latestNav') ? parseFloat(fd.get('latestNav')) : (fund ? fund.latestNav||null : null),
      allocationPct: fd.get('allocationPct') ? parseFloat(fd.get('allocationPct')) : (fund ? fund.allocationPct||null : null),
      navDate: fund ? fund.navDate||null : null, navName: fund ? fund.navName||null : null,
    };
    if(!inv.funds) inv.funds = [];
    if(fund){
      const idx = inv.funds.findIndex(function(f){ return f.id === fund.id; });
      if(idx >= 0) inv.funds[idx] = fdata;
    } else {
      inv.funds.push(fdata);
    }
    await saveOneInvestment(inv);
    closeModal();
    if(view.type === 'investments' || view.type === 'investment-detail') render();
    toast(fund ? 'Fund updated.' : 'Fund added.');
  });
}

async function deleteInvestment(id){
  if(!confirm('Delete this portfolio and all its fund data?')) return;
  investments = investments.filter(function(i){ return i.id !== id; });
  await deleteOneInvestment(id);
  view = { type: 'investments' };
  render();
  toast('Portfolio deleted.');
}

async function deleteFund(invId, fundId){
  const inv = investments.find(function(i){ return i.id === invId; });
  if(!inv) return;
  if(!confirm('Remove this fund from the portfolio?')) return;
  inv.funds = (inv.funds||[]).filter(function(f){ return f.id !== fundId; });
  await saveOneInvestment(inv);
  render();
  toast('Fund removed.');
}

/* ============================== EVENT DELEGATION ============================== */
document.addEventListener('click', async (e) => {
  const t = e.target.closest('[data-action]'); if(!t) return;
  const action = t.dataset.action; const id = t.dataset.id, clientId = t.dataset.client, policyId = t.dataset.policy, viewName = t.dataset.view;
  if(action === 'nav'){ view = { type: viewName }; render(); }
  else if(action === 'view-client'){ view = { type:'client-detail', clientId: id }; render(); }
  else if(action === 'open-client-form'){ openClientForm(id); }
  else if(action === 'delete-client'){ deleteClient(id); }
  else if(action === 'open-policy-form'){ openPolicyForm(clientId, policyId); }
  else if(action === 'delete-policy'){ deletePolicy(clientId, policyId); }
  else if(action === 'mark-paid'){ markPaid(clientId, policyId); }
  else if(action === 'log-contact'){ markContact(id); }
  else if(action === 'close-modal'){ closeModal(); }
  else if(action === 'export-client-pdf'){ exportClientPDF(id); }
  else if(action === 'export-portfolio-pdf'){ exportPortfolioPDF(); }
  else if(action === 'save-settings'){ saveSettingsForm(); }
  else if(action === 'export-backup'){ exportBackup(); }
  else if(action === 'import-backup'){ document.getElementById('backupImportInput')?.click(); }
  else if(action === 'sign-out'){ if(auth) auth.signOut(); }
  else if(action === 'view-investment'){ view = { type:'investment-detail', invId: id }; render(); }
  else if(action === 'open-investment-form'){ openInvestmentForm(id); }
  else if(action === 'delete-investment'){ deleteInvestment(id); }
  else if(action === 'open-fund-form'){ openFundForm(t.dataset.inv, t.dataset.fund); }
  else if(action === 'delete-fund'){ deleteFund(t.dataset.inv, t.dataset.fund); }
  else if(action === 'refresh-prices'){ refreshPrices(id, false); }
  else if(action === 'refresh-all-prices'){ refreshAllPrices(); }
  else if(action === 'open-import-csv'){ openImportCSV(id); }
  else if(action === 'delete-transaction'){ deleteTransaction(t.dataset.inv, t.dataset.tx); }
});

/* ============================== INIT ============================== */
(async function init(){
  if(!FB_READY){
    // Firebase not configured yet — run offline with localStorage
    render(); await loadData(); render();
    return;
  }
  // Show login screen while we wait for auth state
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';

  document.getElementById('signInBtn').addEventListener('click', async () => {
    document.getElementById('loginError').textContent = '';
    try{
      await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }catch(e){
      document.getElementById('loginError').textContent = e.message || 'Sign-in failed. Please try again.';
    }
  });

  auth.onAuthStateChanged(async (user) => {
    if(user){
      currentUser = user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').style.display = 'flex';
      document.getElementById('sidebarFoot').innerHTML =
        `<div style="font-size:11px;color:#9FB0C7;margin-bottom:2px;">Signed in as</div>` +
        `<div style="font-size:12px;color:#C7D0E0;word-break:break-all;margin-bottom:10px;">${esc(user.email)}</div>` +
        `<button data-action="sign-out" style="background:transparent;border:1px solid rgba(255,255,255,0.15);color:#C7D0E0;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;width:100%;">Sign out</button>`;
      render();
      await loadData();
      render();
    } else {
      currentUser = null;
      dataLoaded = false;
      clients = []; categories = []; settings = { advisorName:'', firmName:'', contact:'' };
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appShell').style.display = 'none';
    }
  });
})();
</script>
